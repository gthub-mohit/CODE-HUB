<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeHub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Header Section -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.9"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>CodeHub</h1>
      <p>Sync CodeChef to GitHub</p>
    </div>
    <div class="header-badge">v2.0</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Status Bar -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div id="statusBar" class="status-bar not-connected">
    <div class="status-icon">
      <svg class="icon-disconnected" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <path d="M15 9L9 15M9 9L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="icon-connected" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="status-content">
      <div class="status-label">Status</div>
      <div id="statusText" class="status-text">Not configured</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Tabs -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div class="tabs">
    <button class="tab active" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        <path d="M12 1V5M12 19V23M23 12H19M5 12H1M20.485 3.515L17.657 6.343M6.343 17.657L3.515 20.485M20.485 20.485L17.657 17.657M6.343 6.343L3.515 3.515" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Settings</span>
    </button>
    <button class="tab" data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>History</span>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Settings Panel -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div class="panel active" id="panel-settings">
    <form id="settingsForm">
      <div class="field">
        <label for="githubUsername">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
          </svg>
          GitHub Username
        </label>
        <input 
          type="text" 
          id="githubUsername" 
          placeholder="your-username" 
          autocomplete="off" 
          required 
        />
      </div>

      <div class="field">
        <label for="repoName">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 19C22 19.5304 21.7893 20.0391 21.4142 20.4142C21.0391 20.7893 20.5304 21 20 21H4C3.46957 21 2.96086 20.7893 2.58579 20.4142C2.21071 20.0391 2 19.5304 2 19V5C2 4.46957 2.21071 3.96086 2.58579 3.58579C2.96086 3.21071 3.46957 3 4 3H9L11 6H20C20.5304 6 21.0391 6.21071 21.4142 6.58579C21.7893 6.96086 22 7.46957 22 8V19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Repository Name
        </label>
        <input 
          type="text" 
          id="repoName" 
          placeholder="CodeChef-Solutions" 
          autocomplete="off" 
          required 
        />
        <div class="hint">
          Repository must exist on GitHub. Date folders will be created automatically.
        </div>
      </div>

      <div class="field">
        <label for="githubToken">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Personal Access Token
        </label>
        <div class="password-field">
          <input 
            type="password" 
            id="githubToken" 
            placeholder="ghp_xxxxxxxxxxxx" 
            autocomplete="off" 
            required 
          />
          <button type="button" class="toggle-password" id="togglePassword">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.94 17.94C16.2306 19.243 14.1491 19.9649 12 20C5 20 1 12 1 12C2.24389 9.68192 3.96914 7.65663 6.06 6.06M9.9 4.24C10.5883 4.0789 11.2931 3.99836 12 4C19 4 23 12 23 12C22.393 13.1356 21.6691 14.2048 20.84 15.19M14.12 14.12C13.8454 14.4147 13.5141 14.6512 13.1462 14.8151C12.7782 14.9791 12.3809 15.0673 11.9781 15.0744C11.5753 15.0815 11.1752 15.0074 10.8016 14.8565C10.4281 14.7056 10.0887 14.4811 9.80385 14.1962C9.51897 13.9113 9.29439 13.5719 9.14351 13.1984C8.99262 12.8248 8.91853 12.4247 8.92563 12.0219C8.93274 11.6191 9.02091 11.2218 9.18488 10.8538C9.34884 10.4859 9.58525 10.1546 9.88 9.88" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="hint">
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=CodeHub+Extension" target="_blank" class="link-external">
            Generate new token
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 13V19C18 19.5304 17.7893 20.0391 17.4142 20.4142C17.0391 20.7893 16.5304 21 16 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V8C3 7.46957 3.21071 6.96086 3.58579 6.58579C3.96086 6.21071 4.46957 6 5 6H11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M15 3H21V9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M10 14L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </a>
          <span>— requires <strong>repo</strong> scope</span>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H16L21 8V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21Z" stroke="currentColor" stroke-width="2"/>
          <path d="M17 21V13H7V21" stroke="currentColor" stroke-width="2"/>
          <path d="M7 3V8H15" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Save Configuration</span>
      </button>

      <div class="save-msg" id="saveMsg"></div>
    </form>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- History Panel -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div class="panel" id="panel-history">
    <div id="historyContent">
      <div class="history-empty">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 12V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h3>No solutions yet</h3>
        <p>Solve a problem on CodeChef to see your history here</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- Footer -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div class="footer">
    <span>Powered by</span>
    <strong>Manifest V3</strong>
    <span class="divider">·</span>
    <strong>GitHub API</strong>
  </div>

  <script src="popup.js"></script>
</body>
</html>
